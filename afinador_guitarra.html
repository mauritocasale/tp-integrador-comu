<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Afinador y TX Digital Integrado</title>
<style>
    body { background: #1a1a2e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
    .app { width: 100%; max-width: 400px; }
    canvas { width: 100%; background: #16213e; border-radius: 8px; margin: 10px 0; }
    .tx-panel { background: #1e2a45; padding: 15px; border-radius: 16px; margin-top: 20px; }
    .tx-row { display: flex; justify-content: space-between; margin: 10px 0; align-items: center; }
</style>
</head>
<body>
<div class="app">
    <h1>🎸 Afinador</h1>
    <div id="needle" style="width:4px; height:60px; background:red; margin:0 auto; transition:0.1s"></div>
    <h2 id="noteBig">-</h2>
    <p id="freqTxt">- Hz</p>
    
    <div class="spec-wrap">
        <p style="font-size:12px; color:#8892a4">Espectro FFT</p>
        <canvas id="specCanvas" height="52"></canvas>
    </div>

    <div class="tx-panel">
        <h3 onclick="toggleTx()" style="cursor:pointer">📡 Transmisión (Propuesta 4) ▼</h3>
        <div id="txBody" style="display:none">
            <select id="codecSel" onchange="updateTx()">
                <option value="1.0">PCM</option>
                <option value="0.25">ADPCM</option>
            </select>
            <input type="range" id="errRange" min="0" max="30" value="0" oninput="updateTx()">
            <canvas id="txCanvas" height="50"></canvas>
            <canvas id="rxCanvas" height="50"></canvas>
            <p>SNR: <b id="statSNR">∞</b> dB</p>
        </div>
    </div>
    <button onclick="toggleMic()">🎤 Iniciar</button>
</div>

<script>
let audioCtx, analyser, tBuf = new Float32Array(4096), fData = new Float32Array(2048);

function drawSpectrum() {
    analyser.getFloatFrequencyData(fData);
    const ctx = document.getElementById('specCanvas').getContext('2d');
    ctx.clearRect(0, 0, 400, 52);
    ctx.fillStyle = '#4caf50';
    for(let i=0; i<100; i++) {
        let h = Math.max(0, (fData[i] + 100) * 0.5);
        ctx.fillRect(i * 4, 52 - h, 3, h);
    }
}

function renderTx() {
    const err = parseInt(document.getElementById('errRange').value) / 100;
    const ctxTx = document.getElementById('txCanvas').getContext('2d');
    const ctxRx = document.getElementById('rxCanvas').getContext('2d');
    let sigPower = 0, noisePower = 0;
    
    ctxTx.clearRect(0,0,400,50); ctxRx.clearRect(0,0,400,50);
    ctxTx.beginPath(); ctxRx.beginPath();
    
    for(let i=0; i<200; i++) {
        let val = tBuf[i];
        let rx = (Math.random() < err) ? val + (Math.random()-0.5) : val;
        ctxTx.lineTo(i*2, 25 - val*25); ctxRx.lineTo(i*2, 25 - rx*25);
        sigPower += val*val; noisePower += (rx - val)**2;
    }
    ctxTx.stroke(); ctxRx.stroke();
    const snr = noisePower > 0 ? 10 * Math.log10(sigPower / noisePower) : 99;
    document.getElementById('statSNR').textContent = isFinite(snr) ? snr.toFixed(1) : "∞";
}

function loop() {
    analyser.getFloatTimeDomainData(tBuf);
    drawSpectrum();
    if(document.getElementById('txBody').style.display === 'block') renderTx();
    requestAnimationFrame(loop);
}

async function toggleMic() {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext({sampleRate: 44100});
    analyser = audioCtx.createAnalyser();
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    loop();
}

function toggleTx() { 
    let b = document.getElementById('txBody');
    b.style.display = b.style.display === 'none' ? 'block' : 'none';
}
function updateTx() { renderTx(); }
</script>
</body>
</html>
